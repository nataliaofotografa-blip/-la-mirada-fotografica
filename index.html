<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>La Mirada Fotográfica — Amapola Fotografía</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#fff;--ink:#111;--ink-soft:#333;--ink-mute:#999;--line:#e0e0e0;--line-soft:#f5f5f5;--dark:#111;--nav-h:60px;--maxw:680px}
html{font-size:16px}
body{font-family:Inter,-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--ink);line-height:1.6;padding-bottom:calc(var(--nav-h)+30px);min-height:100vh}
.wrap{max-width:var(--maxw);margin:0 auto;padding:0 22px}
.hdr{position:sticky;top:0;z-index:50;background:rgba(255,255,255,.95);border-bottom:1px solid var(--line)}
.hdr-inner{max-width:var(--maxw);margin:0 auto;padding:14px 22px;display:flex;justify-content:space-between;align-items:center}
.brand{display:flex;align-items:center;gap:10px;cursor:pointer}
.brand-dot{width:28px;height:28px;background:var(--dark);border-radius:7px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:14px}
.brand-name{font-size:14px;font-weight:600;color:var(--ink)}
.brand-sub{font-size:10px;color:var(--ink-mute)}
.hero{padding:40px 0 28px}
.hero h1{font-size:clamp(32px,8vw,52px);font-weight:300;line-height:1;color:var(--ink)}
.hero p{margin-top:14px;font-size:15px;color:var(--ink-mute);line-height:1.6}
.mod{border-top:1px solid var(--line)}
.mod:last-child{border-bottom:1px solid var(--line)}
.mod-head{display:flex;gap:14px;padding:22px 0;cursor:pointer;user-select:none}
.mod-num{font-size:11px;color:var(--ink-mute);width:26px;flex-shrink:0;font-weight:500}
.mod-info{flex:1}
.mod-name{font-size:18px;font-weight:400;color:var(--ink)}
.mod-desc{font-size:12px;color:var(--ink-mute);margin-top:4px}
.mod-toggle{width:20px;height:20px;position:relative;flex-shrink:0}
.mod-toggle::before{content:'';position:absolute;top:50%;left:0;right:0;height:1.5px;background:var(--ink-mute);transform:translateY(-50%);transition:.25s}
.mod-toggle::after{content:'';position:absolute;left:50%;top:0;bottom:0;width:1.5px;background:var(--ink-mute);transform:translateX(-50%);transition:.25s}
.mod.open .mod-toggle::after{opacity:0}
.mod-body{max-height:0;overflow:hidden;transition:max-height .35s}
.mod.open .mod-body{max-height:50000px}
.topic{border-top:1px solid var(--line-soft)}
.topic-head{display:flex;gap:10px;padding:14px 0;cursor:pointer;user-select:none;align-items:center}
.topic-dot{width:4px;height:4px;border-radius:50%;background:var(--ink-mute);flex-shrink:0}
.topic-title{flex:1;font-size:14px;font-weight:500;color:var(--ink-soft)}
.topic.open .topic-title{color:var(--ink);font-weight:600}
.topic-chev{width:14px;height:14px;stroke:var(--ink-mute);fill:none;flex-shrink:0;transition:.25s}
.topic.open .topic-chev{transform:rotate(180deg)}
.topic-body{max-height:0;overflow:hidden;transition:max-height .3s}
.topic.open .topic-body{max-height:10000px}
.topic-content{padding:8px 0 24px;font-size:14px;color:var(--ink-soft);line-height:1.7}
.topic-content strong{color:var(--ink);font-weight:600}
.topic-content em{font-style:italic}
.box{background:var(--line-soft);border:1px solid var(--line);border-left:3px solid var(--dark);border-radius:8px;padding:12px 14px;margin:12px 0;font-size:13px}
.box-t{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--ink);margin-bottom:6px}
.box-d{color:var(--ink-soft);line-height:1.6}
.tl{margin:10px 0;padding-left:20px}
.tl li{margin:6px 0;color:var(--ink-soft);font-size:13px}
.foot{background:var(--dark);color:#fff;margin-top:40px}
.foot-inner{max-width:var(--maxw);margin:0 auto;padding:32px 22px}
.foot-brand{font-size:24px;font-weight:700}
.foot-sub{font-size:12px;color:#888;margin-top:8px}
.foot-copy{font-size:10px;color:#555;margin-top:16px}
.nav{position:fixed;bottom:0;left:0;right:0;z-index:60;background:rgba(255,255,255,.96);border-top:1px solid var(--line)}
.nav-inner{max-width:var(--maxw);margin:0 auto;height:var(--nav-h);display:grid;grid-template-columns:repeat(5,1fr)}
.ni{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;border:none;background:none;cursor:pointer;color:var(--ink-mute);font:inherit;font-size:10px}
.ni svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.7}
.ni.on{color:var(--ink);font-weight:500}
.ni.on svg{stroke-width:2.2}
</style>
</head>
<body>

<header class="hdr">
  <div class="hdr-inner">
    <div class="brand">
      <div class="brand-dot">A</div>
      <div>
        <div class="brand-name">La Mirada Fotográfica</div>
        <div class="brand-sub">Amapola Fotografía</div>
      </div>
    </div>
  </div>
</header>

<main class="wrap">
  <div class="hero">
    <h1>La Mirada<br>Fotográfica</h1>
    <p>Academia de fotografía online (con opción a presenciales). Herramientas, conceptos y técnica para celular y cámara.</p>
  </div>
  <div id="guide-body"></div>
</main>

<footer class="foot">
  <div class="foot-inner">
    <div class="foot-brand">Amapola</div>
    <div class="foot-sub">Academia de fotografía con celular.</div>
    <div class="foot-copy">© Amapola Fotografía 2026 · Natalia Olivera</div>
  </div>
</footer>

<nav class="nav">
  <div class="nav-inner">
    <button class="ni on" data-s="guia" onclick="go('guia')">
      <svg viewBox="0 0 24 24"><path d="M4 5.5A1.5 1.5 0 0 1 5.5 4H11v16H5.5A1.5 1.5 0 0 1 4 18.5z"/><path d="M20 5.5A1.5 1.5 0 0 0 18.5 4H13v16h5.5a1.5 1.5 0 0 0 1.5-1.5z"/></svg>
      <span>Guía</span>
    </button>
    <button class="ni" data-s="buscar" onclick="go('buscar')">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
      <span>Buscar</span>
    </button>
    <button class="ni" data-s="analizar" onclick="go('analizar')">
      <svg viewBox="0 0 24 24"><rect x="3" y="6" width="18" height="14" rx="2.5"/><circle cx="12" cy="13" r="3.5"/></svg>
      <span>Analizar</span>
    </button>
    <button class="ni" data-s="glosario" onclick="go('glosario')">
      <svg viewBox="0 0 24 24"><path d="M5 4h11a3 3 0 0 1 3 3v13H7a2 2 0 0 0-2 2z"/><path d="M5 19V4"/></svg>
      <span>Glosario</span>
    </button>
    <button class="ni" data-s="contacto" onclick="go('contacto')">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 3.5-6 8-6s8 2 8 6"/></svg>
      <span>Contacto</span>
    </button>
  </div>
</nav>

<script>
function go(name){
  document.querySelectorAll('.ni').forEach(n => n.classList.toggle('on', n.dataset.s === name));
}

function toggleMod(i){
  document.getElementById('m-'+i).classList.toggle('open');
}

function toggleTopic(i,j){
  document.getElementById('t-'+i+'-'+j).classList.toggle('open');
}

const CURSO_TOPICS = [
{t:'Bienvenida al taller: para qué sirve esto',h:'<div class="tp">Este taller es para aprender a ver antes que para aprender a disparar. Antes de hablar de celulares, de cámaras o de aplicaciones, vamos a hablar de mirada.</div><div class="tp">No importa si llegaste con un iPhone de última generación o con un Android de tres años. Lo que vas a llevarte de acá no está en el equipo: está en cómo mirás antes de tocar el botón.</div><div class="box"><div class="box-t">¿Para quién es este taller?</div><div class="box-d">Para quien quiera fotografiar con celular y obtener resultados que a ellos mismos les gusten. Para quien sienta que sus fotos no salen bien sin entender por qué.</div></div>'},
{t:'Fotografía móvil vs cámara: mismos principios',h:'<div class="tp">La gran pregunta que aparece siempre: ¿Con celular se pueden sacar buenas fotos? La respuesta es sí, con una condición: que sepas ver.</div><div class="tp">Los principios de la fotografía son los mismos desde 1839. Luz, composición, momento, intención. Eso no cambia. Lo que cambia es la herramienta.</div><div class="box"><div class="box-t">Lo que más importa</div><div class="box-d">Aprender a ver. El celular es la herramienta. La mirada es tuya.</div></div>'},
{t:'Los 3 pilares: por qué una foto funciona',h:'<div class="tp">Antes de hablar de técnica, mirá una foto que te guste. Vas a notar que siempre tiene estas tres cosas:</div><div class="box"><div class="box-t">1. Luz</div><div class="box-d">La foto tiene una luz que funciona. Puede ser suave, dramática, lateral, cálida. Pero hay una decisión de luz.</div></div><div class="box"><div class="box-t">2. Encuadre</div><div class="box-d">Algo quedó dentro del cuadro y algo quedó afuera. Esa decisión es el encuadre.</div></div><div class="box"><div class="box-t">3. Intención</div><div class="box-d">La foto dice algo. Transmite algo. Hay un para qué detrás.</div></div>'},
{t:'La luz: el elemento fundamental',h:'<div class="tp">La palabra fotografía viene del griego: photos (luz) y graphos (escritura). Literalmente: escribir con luz. No fotografiamos objetos: fotografiamos la luz que rebota en ellos.</div><div class="tp">Cuando aprendemos fotografía, el 80% del aprendizaje es aprender a ver la luz: de dónde viene, qué tipo es, qué genera, cómo modificarla o elegirla.</div><div class="box"><div class="box-t">La primera pregunta</div><div class="box-d">Antes de mirar al sujeto, mirá la luz. ¿De dónde viene? ¿Es suave o dura? Esa pregunta, hecha sistemáticamente, cambia todo.</div></div>'},
{t:'Luz suave vs luz dura',h:'<div class="tp">No toda la luz es igual. Hay una diferencia fundamental:</div><div class="box"><div class="box-t">Luz suave</div><div class="box-d">Difusa, sin dirección clara. Día nublado, sombra abierta. Produce sombras suaves. Favorece retratos.</div></div><div class="box"><div class="box-t">Luz dura</div><div class="box-d">Directa, con dirección precisa. Sol directo, mediodía. Produce sombras marcadas. Crea dramatismo.</div></div>'},
{t:'Dirección de la luz',h:'<div class="tp">La misma persona, la misma cámara: cambiá solo la dirección de la luz y tenés fotos completamente distintas.</div><ul class="tl"><li><strong>Luz frontal:</strong> cara pareja, sin sombras, sin volumen. Segura pero plana.</li><li><strong>Luz lateral 45°:</strong> la más usada en retrato. Crea volumen. La más favorecedora.</li><li><strong>Luz lateral 90°:</strong> mitad cara en luz, mitad en sombra. Drama fuerte.</li><li><strong>Contraluz:</strong> la luz viene detrás. Crea silueta o borde luminoso.</li></ul>'},
{t:'La ventana: tu estudio fotográfico',h:'<div class="tp">La mejor fuente de luz disponible siempre es gratis: la luz que entra por una ventana.</div><ul class="tl"><li><strong>Frente a ventana:</strong> luz suave y pareja. Ideal para retratos.</li><li><strong>Costado a ventana:</strong> luz lateral. La opción más fotogénica.</li><li><strong>Contraluz:</strong> muy atmosférico.</li></ul><div class="box"><div class="box-t">Truco</div><div class="box-d">Si el sol da directo, corre la cortina o coloca una sábana blanca como difusor. Luz filtrada = luz de estudio.</div></div>'},
{t:'Encuadre: la decisión más creativa',h:'<div class="tp">Encuadrar es decidir los límites de la imagen: qué entra y qué queda afuera. Esa decisión es enteramente tuya.</div><div class="box"><div class="box-t">El error más frecuente</div><div class="box-d">Fotografiar de muy lejos. El sujeto queda pequeño, perdido. Acercarte es casi siempre la solución.</div></div>'},
{t:'Regla de tercios',h:'<div class="tp">Dividí el cuadro en 9 partes iguales. Los cuatro puntos donde se cruzan las líneas son los más fuertes visualmente. El centro es el más débil.</div><ul class="tl"><li><strong>Retrato:</strong> los ojos sobre la línea horizontal superior.</li><li><strong>Paisaje:</strong> el horizonte en el tercio superior o inferior, nunca al medio.</li><li><strong>Objeto:</strong> en uno de los cuatro cruces, no centrado.</li></ul>'},
{t:'Intención: el tercer pilar',h:'<div class="tp">La intención es la respuesta a ¿para qué tomé esta foto? Es lo que diferencia una imagen de una fotografía. Una imagen registra. Una fotografía comunica.</div><div class="box"><div class="box-t">El test</div><div class="box-d">Muéstrale tu foto a alguien que no sabe el contexto. ¿Entiende qué es lo importante? ¿Siente algo? Si necesitas explicarla, la intención no llegó.</div></div>'}
];

const GUIDE = [{
  name: 'El Curso (Presencial)',
  desc: 'Luz · Encuadre · Intención · Composición · Edición',
  topics: CURSO_TOPICS
}];

function renderGuide(){
  let html = '';
  for(let i=0; i<GUIDE.length; i++){
    const g = GUIDE[i];
    let topics = '';
    for(let j=0; j<g.topics.length; j++){
      topics += `<div class="topic" id="t-${i}-${j}">
        <div class="topic-head" onclick="toggleTopic(${i},${j})">
          <div class="topic-dot"></div>
          <div class="topic-title">${g.topics[j].t}</div>
          <svg class="topic-chev" viewBox="0 0 24 24"><path d="m6 9 6 6 6-6"/></svg>
        </div>
        <div class="topic-body">
          <div class="topic-content">${g.topics[j].h}</div>
        </div>
      </div>`;
    }
    const num = (i+1).toString().padStart(2, '0');
    html += `<div class="mod" id="m-${i}">
      <div class="mod-head" onclick="toggleMod(${i})">
        <div class="mod-num">${num}</div>
        <div class="mod-info">
          <div class="mod-name">${g.name}</div>
          <div class="mod-desc">${g.desc}</div>
        </div>
        <div class="mod-toggle"></div>
      </div>
      <div class="mod-body">
        <div class="topic">${topics}</div>
      </div>
    </div>`;
  }
  document.getElementById('guide-body').innerHTML = html;
}

renderGuide();
</script>
</body>
</html>
