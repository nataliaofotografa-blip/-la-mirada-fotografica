<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>La Mirada Fotográfica</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Inter, sans-serif; background: #fff; color: #111; line-height: 1.6; }
.hdr { position: sticky; top: 0; background: rgba(255,255,255,0.95); border-bottom: 1px solid #e0e0e0; padding: 14px 0; z-index: 50; }
.hdr-in { max-width: 680px; margin: 0 auto; padding: 0 22px; display: flex; justify-content: space-between; align-items: center; }
.brand { display: flex; align-items: center; gap: 10px; cursor: pointer; }
.brand-dot { width: 28px; height: 28px; background: #111; border-radius: 7px; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 800; }
.brand-name { font-size: 14px; font-weight: 600; }
.brand-sub { font-size: 10px; color: #999; }
main { max-width: 680px; margin: 0 auto; padding: 0 22px; padding-bottom: 100px; }
.hero { padding: 40px 0; }
.hero h1 { font-size: clamp(32px, 8vw, 52px); font-weight: 300; line-height: 1; margin-bottom: 14px; }
.hero p { font-size: 15px; color: #999; }
.mod { border-top: 1px solid #e0e0e0; }
.mod:last-child { border-bottom: 1px solid #e0e0e0; }
.mod-head { padding: 22px 0; cursor: pointer; display: flex; align-items: center; gap: 14px; user-select: none; }
.mod-num { font-size: 11px; color: #999; width: 26px; flex-shrink: 0; }
.mod-info { flex: 1; }
.mod-name { font-size: 18px; font-weight: 400; color: #111; }
.mod-desc { font-size: 13px; color: #999; margin-top: 4px; }
.mod-toggle { width: 20px; height: 20px; flex-shrink: 0; }
.mod-toggle::before { content: ''; position: absolute; top: 50%; left: 0; right: 0; height: 1.5px; background: #999; }
.mod-toggle::after { content: ''; position: absolute; left: 50%; top: 0; bottom: 0; width: 1.5px; background: #999; }
.mod.open .mod-toggle::after { opacity: 0; }
.mod-body { max-height: 0; overflow: hidden; transition: max-height 0.3s; }
.mod.open .mod-body { max-height: 50000px; }
.topic { border-top: 1px solid #f5f5f5; }
.topic-head { padding: 14px 0; cursor: pointer; display: flex; align-items: center; gap: 10px; user-select: none; }
.topic-dot { width: 4px; height: 4px; border-radius: 50%; background: #999; }
.topic-title { flex: 1; font-size: 14px; font-weight: 500; color: #333; }
.topic.open .topic-title { color: #111; font-weight: 600; }
.topic-body { max-height: 0; overflow: hidden; transition: max-height 0.3s; }
.topic.open .topic-body { max-height: 10000px; }
.topic-content { padding: 8px 0 24px; font-size: 14px; color: #333; line-height: 1.65; }
.topic-content strong { color: #111; font-weight: 600; }
.box { background: #f5f5f5; border: 1px solid #e0e0e0; border-left: 3px solid #111; border-radius: 8px; padding: 12px 14px; margin: 12px 0; }
.box-t { font-size: 10px; font-weight: 600; text-transform: uppercase; color: #111; margin-bottom: 6px; }
.box-d { font-size: 13px; color: #333; }
.tl { margin: 10px 0; padding-left: 20px; }
.tl li { margin: 6px 0; }
.nav { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(255,255,255,0.96); border-top: 1px solid #e0e0e0; z-index: 60; }
.nav-in { max-width: 680px; margin: 0 auto; display: grid; grid-template-columns: repeat(5, 1fr); height: 60px; }
.ni { border: none; background: none; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; color: #999; font-size: 10px; font-family: inherit; }
.ni.on { color: #111; font-weight: 500; }
.foot { background: #111; color: #fff; margin-top: 40px; padding: 32px 0; }
.foot-in { max-width: 680px; margin: 0 auto; padding: 0 22px; }
.foot-brand { font-size: 24px; font-weight: 700; }
.foot-sub { font-size: 12px; color: #888; margin-top: 8px; }
.foot-copy { font-size: 10px; color: #555; margin-top: 16px; }
</style>
</head>
<body>

<header class="hdr">
  <div class="hdr-in">
    <div class="brand">
      <div class="brand-dot">A</div>
      <div>
        <div class="brand-name">La Mirada Fotográfica</div>
        <div class="brand-sub">Amapola Fotografía</div>
      </div>
    </div>
  </div>
</header>

<main>
  <div class="hero">
    <h1>La Mirada Fotográfica</h1>
    <p>Academia de fotografía online. Herramientas, conceptos y técnica para celular y cámara.</p>
  </div>
  <div id="content"></div>
</main>

<footer class="foot">
  <div class="foot-in">
    <div class="foot-brand">Amapola</div>
    <div class="foot-sub">Academia de fotografía con celular</div>
    <div class="foot-copy">© Amapola Fotografía 2026 · Natalia Olivera</div>
  </div>
</footer>

<nav class="nav">
  <div class="nav-in">
    <button class="ni on" onclick="alert('Guía')">
      <span>📚</span>
      <span>Guía</span>
    </button>
    <button class="ni" onclick="alert('Buscar')">
      <span>🔍</span>
      <span>Buscar</span>
    </button>
    <button class="ni" onclick="alert('Analizar')">
      <span>📸</span>
      <span>Analizar</span>
    </button>
    <button class="ni" onclick="alert('Glosario')">
      <span>📖</span>
      <span>Glosario</span>
    </button>
    <button class="ni" onclick="alert('Contacto')">
      <span>💬</span>
      <span>Contacto</span>
    </button>
  </div>
</nav>

<script>
const TOPICS = [
  { title: 'Bienvenida', content: 'Este taller es para aprender a ver antes que disparar. La mirada es lo más importante.' },
  { title: 'La luz: elemento fundamental', content: 'Fotografía = escribir con luz. El 80% del aprendizaje es aprender a ver la luz.' },
  { title: 'Luz suave vs dura', content: 'Luz suave: difusa, favorable. Luz dura: directa, dramática. Cada una transmite algo distinto.' },
  { title: 'Dirección de la luz', content: 'Frontal, lateral 45°, lateral 90°, contraluz. Cada ángulo cuenta una historia distinta.' },
  { title: 'La ventana: tu estudio', content: 'La mejor fuente de luz disponible siempre. Si el sol da directo, difúmelo con cortina o sábana.' },
  { title: 'Encuadre creativo', content: 'Encuadrar es decidir qué entra y qué queda afuera. Error frecuente: fotografiar de muy lejos.' },
  { title: 'Regla de tercios', content: 'Los 4 puntos de cruce son los más fuertes. Pon el sujeto ahí, no en el centro.' },
  { title: 'Intención: el tercer pilar', content: 'La intención diferencia una imagen de una fotografía. ¿Para qué tomé esta foto?' },
  { title: 'Edición: no es trampa', content: 'Editar es natural desde siempre. El objetivo es que la foto parezca real pero mejor.' },
  { title: 'Tarea: las 3 preguntas', content: '¿Qué? ¿Cómo? ¿Para qué? Responde antes de cada foto durante una semana.' }
];

function render() {
  let html = '<div class="mod">';
  html += '<div class="mod-head" onclick="toggle(this)"><div class="mod-num">01</div><div class="mod-info"><div class="mod-name">El Curso (Presencial)</div><div class="mod-desc">Luz · Encuadre · Intención · Composición · Edición</div></div><div class="mod-toggle" style="position:relative;"></div></div>';
  html += '<div class="mod-body">';

  TOPICS.forEach((t, i) => {
    html += '<div class="topic">';
    html += '<div class="topic-head" onclick="toggle(this)"><div class="topic-dot"></div><div class="topic-title">' + t.title + '</div></div>';
    html += '<div class="topic-body"><div class="topic-content"><div class="box"><div class="box-t">Lección ' + (i+1) + '</div><div class="box-d">' + t.content + '</div></div></div></div>';
    html += '</div>';
  });

  html += '</div></div>';
  document.getElementById('content').innerHTML = html;
}

function toggle(el) {
  const parent = el.closest('.mod') || el.closest('.topic');
  if (parent) parent.classList.toggle('open');
}

render();
</script>

</body>
</html>
